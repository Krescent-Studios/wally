services:
  backend:
    image: ghcr.io/pathos-iii-krescent/wally:latest
    environment:
      - WALLY_auth=${WALLY_auth}
      - WALLY_github_token=${WALLY_github_token}
    networks:
      - traefik
    volumes:
      - packages:/app/packages
    entrypoint: >
      sh -c "chown -R 1000:1000 /app/packages && exec /app/wally-server"
    deploy:
      labels:
        traefik.enable: "true"
        traefik.http.routers.wally.rule: "Host(`wally.pathos.gg`)"
        traefik.http.services.wally.loadbalancer.server.port: 8000

networks:
  traefik:
    external: true

volumes:
  packages: